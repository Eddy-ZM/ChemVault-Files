name: ChemVaultFiles
options:
  bundleIdPrefix: science.chemvault
settings:
  base:
    DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
packages: {}
targets:
  ChemVaultFiles:
    type: application
    platform: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - Sources/ChemVaultFiles
    resources:
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(BUNDLE_ID)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: ChemVault Files
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleURLName: ChemVault Files
            CFBundleURLSchemes:
              - chemvaultfiles
